<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reality Decay 🫪</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e8e8e8;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 100;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .title {
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 700;
      text-align: center;
      margin: 30px 0 6px;
      background: linear-gradient(90deg, #ff4040, #ff8800, #ffee00, #44ff88, #4488ff, #aa44ff, #ff4040);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: hue-scroll 4s linear infinite;
    }
    @keyframes hue-scroll { to { background-position: 300% 0; } }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.5;
      margin-bottom: 24px;
      text-align: center;
    }

    .tier-bar {
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
      flex-wrap: wrap;
      max-width: 820px;
      width: 100%;
    }
    .tier-btn {
      flex: 1 1 0;
      min-width: 100px;
      padding: 12px 8px;
      background: rgba(255,255,255,0.04);
      border: none;
      color: #aaa;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms;
      text-align: center;
      line-height: 1.35;
    }
    .tier-btn:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.08); }
    .tier-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .tier-btn.active { color: #fff; }
    .tier-btn[data-tier="0"].active { background: #1a3a2a; }
    .tier-btn[data-tier="1"].active { background: #1a2a4a; }
    .tier-btn[data-tier="2"].active { background: #2a1a4a; }
    .tier-btn[data-tier="3"].active { background: #3a1a3a; }
    .tier-btn[data-tier="4"].active { background: #4a1a1a; }
    .tier-btn[data-tier="5"].active { background: #5a0a0a; }

    .stage {
      position: relative;
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 80px rgba(120, 0, 255, 0.15), 0 0 30px rgba(255, 60, 60, 0.1);
    }
    .stage canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info {
      margin-top: 24px;
      text-align: center;
      max-width: 500px;
    }
    .mood {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .cta {
      display: inline-block;
      margin-top: 14px;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.05rem;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: transform 150ms;
      color: #fff;
    }
    .cta:active { transform: scale(0.97); }
    .cta[data-tier="0"] { background: linear-gradient(135deg, #22aa55, #118844); box-shadow: 0 8px 30px rgba(34,170,85,0.35); }
    .cta[data-tier="1"] { background: linear-gradient(135deg, #3366dd, #2244aa); box-shadow: 0 8px 30px rgba(51,102,221,0.35); }
    .cta[data-tier="2"] { background: linear-gradient(135deg, #7744dd, #5522aa); box-shadow: 0 8px 30px rgba(119,68,221,0.35); }
    .cta[data-tier="3"] { background: linear-gradient(135deg, #cc44ff, #8822bb); box-shadow: 0 8px 30px rgba(200,68,255,0.35); }
    .cta[data-tier="4"] { background: linear-gradient(135deg, #ff4444, #cc1111); box-shadow: 0 8px 30px rgba(255,68,68,0.4); }
    .cta[data-tier="5"] { background: linear-gradient(135deg, #ff0000, #990000); box-shadow: 0 8px 40px rgba(255,0,0,0.5); }

    .mc-label {
      margin-top: 12px;
      font-size: 0.85rem;
      opacity: 0.4;
    }

    /* ---- $1B takeover ---- */
    .takeover {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      overflow: hidden;
    }
    .takeover.active { display: block; }
    .takeover-grid {
      display: flex;
      flex-wrap: wrap;
      width: 100vw;
      min-height: 100vh;
    }
    .takeover-grid canvas {
      width: 20vw;
      height: 20vw;
    }
    .takeover-text {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 55;
      pointer-events: none;
    }
    .takeover-text h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      color: #fff;
      text-shadow: 0 0 40px #ff0000, 0 0 80px #ff0000;
      animation: pulse-text 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-text {
      to { transform: scale(1.06); text-shadow: 0 0 60px #ff4400, 0 0 120px #ff0000; }
    }

    @media (max-width: 600px) {
      .tier-btn { min-width: 0; font-size: 0.65rem; padding: 10px 4px; }
      .takeover-grid canvas { width: 33.33vw; height: 33.33vw; }
    }
  </style>
</head>
<body>
<div class="page" id="page">
  <h1 class="title">The Reality Decay 🫪</h1>
  <p class="subtitle">As MC rises, reality crumbles.</p>

  <div class="tier-bar">
    <button class="tier-btn active" data-tier="0">&lt;$1M<br>Stable</button>
    <button class="tier-btn" data-tier="1">$10M<br>Warping</button>
    <button class="tier-btn" data-tier="2">$100M<br>Melting</button>
    <button class="tier-btn" data-tier="3">$500M<br>Shattered</button>
    <button class="tier-btn" data-tier="4">$900M<br>Collapsed</button>
    <button class="tier-btn" data-tier="5">$1B<br>SINGULARITY</button>
  </div>

  <div class="stage" id="stage">
    <canvas id="canvas"></canvas>
  </div>

  <div class="info">
    <div class="mood" id="mood">Stable Reality</div>
    <button class="cta" id="cta" data-tier="0">Needs more distortion. Ape in.</button>
    <div class="mc-label" id="mcLabel">Market Cap: &lt;$1M</div>
  </div>
</div>

<div class="takeover" id="takeover">
  <div class="takeover-grid" id="takeoverGrid"></div>
  <div class="takeover-text"><h1>WE ARE ALL DISTORTED 🫪</h1></div>
</div>

<script>
const TIERS = [
  { level: 15,  mood: "Stable Reality", cta: "Needs more distortion. Ape in.",   mc: "Market Cap: <$1M" },
  { level: 30,  mood: "Warping",        cta: "Reality is bending. Buy the dip.", mc: "Market Cap: $10M" },
  { level: 50,  mood: "Melting",         cta: "Face is melting. Send it!",        mc: "Market Cap: $100M" },
  { level: 80,  mood: "Shattered",       cta: "There is no going back.",          mc: "Market Cap: $500M" },
  { level: 100, mood: "Collapsed",       cta: "Reality has collapsed.",           mc: "Market Cap: $900M" },
  { level: 100, mood: "SINGULARITY",     cta: "WE ARE ALL DISTORTED. 🫪",        mc: "Market Cap: $1B+" },
];

let currentTier = 0;

const moodEl   = document.getElementById("mood");
const ctaEl    = document.getElementById("cta");
const mcEl     = document.getElementById("mcLabel");
const canvas   = document.getElementById("canvas");
const ctx      = canvas.getContext("2d", { willReadFrequently: true });
const takeover = document.getElementById("takeover");
const takeoverGrid = document.getElementById("takeoverGrid");
const tierBtns = document.querySelectorAll(".tier-btn");

// Source image
const sourceCanvas = document.createElement("canvas");
const sourceCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
let sourceLoaded = false;

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function sampleBilinear(srcData, w, h, fx, fy, ch) {
  const x0 = Math.floor(fx), y0 = Math.floor(fy);
  const x1 = Math.min(x0 + 1, w - 1), y1 = Math.min(y0 + 1, h - 1);
  const dx = fx - x0, dy = fy - y0;
  const cx0 = clamp(x0, 0, w - 1), cy0 = clamp(y0, 0, h - 1);
  const tl = srcData[(cy0 * w + cx0) * 4 + ch];
  const tr = srcData[(cy0 * w + x1) * 4 + ch];
  const bl = srcData[(y1 * w + cx0) * 4 + ch];
  const br = srcData[(y1 * w + x1) * 4 + ch];
  return tl * (1 - dx) * (1 - dy) + tr * dx * (1 - dy) + bl * (1 - dx) * dy + br * dx * dy;
}

function distort(targetCanvas, level) {
  if (!sourceLoaded) return;
  const w = sourceCanvas.width, h = sourceCanvas.height;
  targetCanvas.width = w;
  targetCanvas.height = h;
  const tCtx = targetCanvas.getContext("2d", { willReadFrequently: true });
  const src = sourceCtx.getImageData(0, 0, w, h);
  const srcData = src.data;
  const out = tCtx.createImageData(w, h);
  const outData = out.data;

  const t = level / 100;
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(cx, cy) * 0.92;
  const bulgeStrength = 1 + t * 1.2;
  const vertStretch = 1 + t * 0.35;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let dx = (x - cx) / radius;
      let dy = (y - cy) / radius;
      dy /= vertStretch;
      const r = Math.sqrt(dx * dx + dy * dy);
      let sx, sy;
      if (r < 1.0 && r > 0) {
        const rn = Math.pow(r, bulgeStrength) / r;
        sx = cx + dx * rn * radius;
        sy = cy + dy * rn * radius;
      } else {
        sx = cx + dx * radius;
        sy = cy + dy * radius;
      }
      sx = clamp(sx, 0, w - 1);
      sy = clamp(sy, 0, h - 1);
      const i = (y * w + x) * 4;
      outData[i]     = sampleBilinear(srcData, w, h, sx, sy, 0);
      outData[i + 1] = sampleBilinear(srcData, w, h, sx, sy, 1);
      outData[i + 2] = sampleBilinear(srcData, w, h, sx, sy, 2);
      outData[i + 3] = 255;
    }
  }
  tCtx.putImageData(out, 0, 0);
}

function applyTier(tier) {
  currentTier = tier;
  const t = TIERS[tier];
  moodEl.textContent = t.mood;
  ctaEl.textContent  = t.cta;
  ctaEl.dataset.tier = tier;
  mcEl.textContent   = t.mc;
  tierBtns.forEach(b => b.classList.toggle("active", Number(b.dataset.tier) === tier));

  if (tier === 5) {
    // $1B takeover — fill entire page with level 100 distorted faces
    takeover.classList.add("active");
    takeoverGrid.innerHTML = "";
    const count = 25; // 5x5 grid
    for (let i = 0; i < count; i++) {
      const c = document.createElement("canvas");
      takeoverGrid.appendChild(c);
      distort(c, 100);
    }
  } else {
    takeover.classList.remove("active");
    distort(canvas, t.level);
  }
}

tierBtns.forEach(btn => {
  btn.addEventListener("click", () => applyTier(Number(btn.dataset.tier)));
});

// Load the face image
const faceImg = new Image();
faceImg.onload = () => {
  sourceCanvas.width = faceImg.width;
  sourceCanvas.height = faceImg.height;
  sourceCtx.drawImage(faceImg, 0, 0);
  sourceLoaded = true;
  applyTier(0);
};
faceImg.src = "default.png";
</script>
</body>
</html>
