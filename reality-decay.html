<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reality Decay 🫪</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e8e8e8;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ---- scanline overlay ---- */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.06) 0px,
        rgba(0,0,0,0.06) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 100;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ---- header ---- */
    .title {
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 700;
      text-align: center;
      margin: 30px 0 6px;
      background: linear-gradient(90deg, #ff4040, #ff8800, #ffee00, #44ff88, #4488ff, #aa44ff, #ff4040);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: hue-scroll 4s linear infinite;
    }
    @keyframes hue-scroll {
      to { background-position: 300% 0; }
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.5;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ---- tier selector ---- */
    .tier-bar {
      display: flex;
      gap: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
      flex-wrap: wrap;
      max-width: 680px;
      width: 100%;
    }
    .tier-btn {
      flex: 1 1 0;
      min-width: 140px;
      padding: 12px 10px;
      background: rgba(255,255,255,0.04);
      border: none;
      color: #aaa;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms;
      text-align: center;
      line-height: 1.35;
    }
    .tier-btn:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.08); }
    .tier-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .tier-btn.active { color: #fff; }
    .tier-btn[data-tier="0"].active { background: #1a3a2a; }
    .tier-btn[data-tier="1"].active { background: #2a2a4a; }
    .tier-btn[data-tier="2"].active { background: #3a1a3a; }
    .tier-btn[data-tier="3"].active { background: #4a1a1a; }

    /* ---- canvas stage ---- */
    .stage {
      position: relative;
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 80px rgba(120, 0, 255, 0.15), 0 0 30px rgba(255, 60, 60, 0.1);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ---- info card ---- */
    .info {
      margin-top: 24px;
      text-align: center;
      max-width: 500px;
    }
    .mood {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .cta {
      display: inline-block;
      margin-top: 14px;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.05rem;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: transform 150ms, box-shadow 150ms;
      color: #fff;
    }
    .cta:active { transform: scale(0.97); }

    .cta[data-tier="0"] { background: linear-gradient(135deg, #22aa55, #118844); box-shadow: 0 8px 30px rgba(34,170,85,0.35); }
    .cta[data-tier="1"] { background: linear-gradient(135deg, #4466ff, #2244cc); box-shadow: 0 8px 30px rgba(68,102,255,0.35); }
    .cta[data-tier="2"] { background: linear-gradient(135deg, #cc44ff, #8822bb); box-shadow: 0 8px 30px rgba(200,68,255,0.35); }
    .cta[data-tier="3"] { background: linear-gradient(135deg, #ff2222, #cc0000); box-shadow: 0 8px 30px rgba(255,34,34,0.45); }

    .mc-label {
      margin-top: 12px;
      font-size: 0.85rem;
      opacity: 0.4;
    }

    /* ---- mobile ---- */
    @media (max-width: 500px) {
      .tier-btn { min-width: 0; font-size: 0.72rem; padding: 10px 6px; }
    }
  </style>
</head>
<body>
<div class="page">
  <h1 class="title">The Reality Decay 🫪</h1>
  <p class="subtitle">As MC rises, reality crumbles.</p>

  <div class="tier-bar">
    <button class="tier-btn active" data-tier="0">&lt;$1M<br>Stable Reality</button>
    <button class="tier-btn" data-tier="1">$1M–$10M<br>Warp Drive</button>
    <button class="tier-btn" data-tier="2">$10M–$50M<br>Psychedelic Fever</button>
    <button class="tier-btn" data-tier="3">$100M+<br>Singularity</button>
  </div>

  <div class="stage">
    <canvas id="gl"></canvas>
  </div>

  <div class="info">
    <div class="mood" id="mood">Stable Reality</div>
    <button class="cta" id="cta" data-tier="0">Needs more distortion. Ape in.</button>
    <div class="mc-label" id="mcLabel">Market Cap: &lt;$1M</div>
  </div>
</div>

<script>
// ===== Tier data =====
const TIERS = [
  { mood: "Stable Reality",    cta: "Needs more distortion. Ape in.",         mc: "Market Cap: <$1M" },
  { mood: "Warp Drive",        cta: "Reality is bending. Buy the dip.",       mc: "Market Cap: $1M – $10M" },
  { mood: "Psychedelic Fever", cta: "Interns are watching. Send it!",         mc: "Market Cap: $10M – $50M" },
  { mood: "Singularity",       cta: "WE ARE THE EMOJI. 🫪",                  mc: "Market Cap: $100M+" },
];

let currentTier = 0;

// ===== DOM =====
const moodEl  = document.getElementById("mood");
const ctaEl   = document.getElementById("cta");
const mcEl    = document.getElementById("mcLabel");
const canvas  = document.getElementById("gl");
const tierBtns = document.querySelectorAll(".tier-btn");

tierBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    currentTier = Number(btn.dataset.tier);
    tierBtns.forEach(b => b.classList.toggle("active", b === btn));
    moodEl.textContent = TIERS[currentTier].mood;
    ctaEl.textContent  = TIERS[currentTier].cta;
    ctaEl.dataset.tier = currentTier;
    mcEl.textContent   = TIERS[currentTier].mc;
  });
});

// ===== Render the 🫪 emoji to a texture =====
function createEmojiTexture(size) {
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, size, size);
  ctx.font = `${size * 0.7}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🫪", size / 2, size / 2 + size * 0.03);
  return c;
}

// ===== WebGL =====
const gl = canvas.getContext("webgl", { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = "<h1 style='color:#fff;text-align:center;padding:40px'>WebGL not supported</h1>"; }

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const VERT = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const FRAG = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
uniform float u_time;
uniform float u_tier;  // 0..3

// --- helpers ---
vec2 center = vec2(0.5);

void main() {
  vec2 uv = v_uv;
  vec2 d  = uv - center;
  float dist = length(d);
  float angle = atan(d.y, d.x);

  // ======= TIER 0 : Stable Reality — subtle wobble + 5% fisheye =======
  float wobble = sin(u_time * 1.5 + uv.y * 12.0) * 0.003 + cos(u_time * 1.2 + uv.x * 10.0) * 0.003;
  uv += wobble;
  // Mild fisheye
  vec2 d0 = uv - center;
  float r0 = length(d0);
  float fisheye0 = 1.0 + 0.05 * r0 * r0;
  uv = center + d0 * fisheye0;

  if (u_tier >= 1.0) {
    // ======= TIER 1 : Warp Drive — eyes drifting + 30% liquid swirl =======
    vec2 d1 = uv - center;
    float r1 = length(d1);
    float a1 = atan(d1.y, d1.x);
    float swirl1 = 0.3 * (1.0 - smoothstep(0.0, 0.5, r1)) * sin(u_time * 0.8);
    a1 += swirl1;
    uv = center + r1 * vec2(cos(a1), sin(a1));
    // Eye drift
    uv.x += sin(u_time * 2.0 + uv.y * 8.0) * 0.012;
    uv.y += cos(u_time * 1.6 + uv.x * 6.0) * 0.008;
  }

  if (u_tier >= 2.0) {
    // ======= TIER 2 : Psychedelic Fever — 60% swirl + chromatic aberration =======
    vec2 d2 = uv - center;
    float r2 = length(d2);
    float a2 = atan(d2.y, d2.x);
    float swirl2 = 0.6 * (1.0 - smoothstep(0.0, 0.55, r2)) * sin(u_time * 1.2 + 1.0);
    a2 += swirl2;
    uv = center + r2 * vec2(cos(a2), sin(a2));
  }

  if (u_tier >= 3.0) {
    // ======= TIER 3 : Singularity — kaleidoscopic vortex =======
    vec2 d3 = uv - center;
    float r3 = length(d3);
    float a3 = atan(d3.y, d3.x);
    // Kaleidoscope: mirror into 6 segments
    float segments = 6.0;
    a3 = mod(a3, 6.2832 / segments);
    a3 = abs(a3 - 3.1416 / segments);
    uv = center + r3 * vec2(cos(a3), sin(a3));
    // Massive vortex
    vec2 d4 = uv - center;
    float r4 = length(d4);
    float a4 = atan(d4.y, d4.x);
    a4 += 1.5 * (1.0 - smoothstep(0.0, 0.6, r4)) * sin(u_time * 0.6);
    uv = center + r4 * vec2(cos(a4), sin(a4));
    // Pulse zoom
    float pulse = 1.0 + 0.06 * sin(u_time * 3.0);
    uv = center + (uv - center) * pulse;
  }

  // Clamp
  uv = clamp(uv, 0.0, 1.0);

  // --- Chromatic aberration (scales with tier) ---
  float aberr = (0.002 + u_tier * 0.006) * (0.5 + 0.5 * sin(u_time * 2.0));
  vec2 dir = normalize(uv - center + 0.001);
  float r = texture2D(u_tex, uv + dir * aberr).r;
  float g = texture2D(u_tex, uv).g;
  float b = texture2D(u_tex, uv - dir * aberr).b;

  vec3 col = vec3(r, g, b);

  // Vignette
  float vig = 1.0 - smoothstep(0.3, 0.75, length(v_uv - center));
  col *= 0.7 + 0.3 * vig;

  // Tier 3: color cycling
  if (u_tier >= 3.0) {
    float hueShift = u_time * 0.4;
    col.r *= 0.8 + 0.2 * sin(hueShift);
    col.g *= 0.8 + 0.2 * sin(hueShift + 2.094);
    col.b *= 0.8 + 0.2 * sin(hueShift + 4.189);
  }

  gl_FragColor = vec4(col, 1.0);
}`;

const vs = compileShader(gl.VERTEX_SHADER, VERT);
const fs = compileShader(gl.FRAGMENT_SHADER, FRAG);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, "a_pos");
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uTime = gl.getUniformLocation(prog, "u_time");
const uTier = gl.getUniformLocation(prog, "u_tier");
const uTex  = gl.getUniformLocation(prog, "u_tex");

// Texture
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

const emojiCanvas = createEmojiTexture(512);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, emojiCanvas);

// Resize
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = rect.width * dpr;
  canvas.height = rect.height * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener("resize", resize);
resize();

// Render loop
function frame(t) {
  const sec = t * 0.001;
  gl.uniform1f(uTime, sec);
  gl.uniform1f(uTier, currentTier);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
